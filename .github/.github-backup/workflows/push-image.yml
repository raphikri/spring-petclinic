name: push image Workflow
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get Maven version
        id: get_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set lower case owner name
        run: |
          echo "OWNER_LOWER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build Docker image with Spring Boot Buildpacks
        run: |
          ./mvnw spring-boot:build-image \
            -Dspring-boot.build-image.imageName=ghcr.io/${{ env.OWNER_LOWER }}/${{ github.event.repository.name }}:${{ steps.get_version.outputs.version }}
      - name: Tag image with version, sha and latest
        run: |
          docker tag ghcr.io/${{ env.OWNER_LOWER }}/${{ github.event.repository.name }}:${{ steps.get_version.outputs.version }} ghcr.io/${{ env.OWNER_LOWER }}/${{ github.event.repository.name }}:${{ steps.get_version.outputs.version }}
          docker tag ghcr.io/${{ env.OWNER_LOWER }}/${{ github.event.repository.name }}:${{ steps.get_version.outputs.version }} ghcr.io/${{ env.OWNER_LOWER }}/${{ github.event.repository.name }}:${{ github.sha }}
          docker tag ghcr.io/${{ env.OWNER_LOWER }}/${{ github.event.repository.name }}:${{ steps.get_version.outputs.version }} ghcr.io/${{ env.OWNER_LOWER }}/${{ github.event.repository.name }}:latest

      - name: Push all tags to GHCR
        run: |
          docker push ghcr.io/${{ env.OWNER_LOWER }}/${{ github.event.repository.name }}:${{ steps.get_version.outputs.version }}
          docker push ghcr.io/${{ env.OWNER_LOWER }}/${{ github.event.repository.name }}:${{ github.sha }}
          docker push ghcr.io/${{ env.OWNER_LOWER }}/${{ github.event.repository.name }}:latest
    